[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"

[rpc_endpoints]
mezo_testnet = "${MEZO_TESTNET_RPC_URL}"
mezo_mainnet = "${MEZO_MAINNET_RPC_URL}"

[etherscan]
mezo_testnet = { key = "${MEZO_EXPLORER_API_KEY}", url = "https://explorer.test.mezo.org/api" }
mezo_mainnet = { key = "${MEZO_EXPLORER_API_KEY}", url = "https://explorer.mezo.org/api" }
